services:
  app:
    image: aatufutaa/express-app:latest
    container_name: express-app
    ports:
      - "8080:8080"
    restart: always

  watchtower:
    image: nickfedor/watchtower
    environment:
      -  WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower